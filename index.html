<!DOCTYPE html>
<html>
<head>
  <title>Study Planner</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f2f5;
      margin: 0;
    }

    header {
      background: #1e1e2f;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 500px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .input-box {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #f9f9f9;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
    }

    .done {
      text-decoration: line-through;
      color: gray;
    }

    .delete {
      background: red;
      border-radius: 5px;
    }
  </style>

</head>

<body>

<header>📚 Study Planner</header>

<div class="container">

  <div class="input-box">
    <input id="taskInput" placeholder="Enter your task..." />
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>

</div>

<script>

// Load saved tasks when page opens
window.onload = function () {
  const saved = JSON.parse(localStorage.getItem("tasks")) || [];
  saved.forEach(task => createTask(task.text, task.done));
};

function addTask() {
  const input = document.getElementById("taskInput");
  const text = input.value;

  if (text === "") return;

  createTask(text, false);
  saveTasks();

  input.value = "";
}

function createTask(text, isDone) {
  const li = document.createElement("li");

  li.innerHTML = `
    <span onclick="toggleDone(this)">${text}</span>
    <button class="delete" onclick="deleteTask(this)">X</button>
  `;

  if (isDone) {
    li.querySelector("span").classList.add("done");
  }

  document.getElementById("taskList").appendChild(li);
}

function deleteTask(btn) {
  btn.parentElement.remove();
  saveTasks();
}

function toggleDone(el) {
  el.classList.toggle("done");
  saveTasks();
}

// Save tasks to browser
function saveTasks() {
  const tasks = [];

  document.querySelectorAll("#taskList li").forEach(li => {
    tasks.push({
      text: li.querySelector("span").innerText,
      done: li.querySelector("span").classList.contains("done")
    });
  });

  localStorage.setItem("tasks", JSON.stringify(tasks));
}

</script>


</body>
</html>
