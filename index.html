<!DOCTYPE html>
<html>
<head>
  <title>FocusFlow</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    header {
      text-align: center;
      color: white;
      padding: 20px;
      font-size: 26px;
      font-weight: bold;
    }

    .subtitle {
      text-align: center;
      color: white;
      margin-top: -10px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .container {
      max-width: 420px;
      margin: 20px auto;
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .input-box {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 15px;
    }

    button {
      padding: 12px 15px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #5563c1;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #f7f7f7;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.2s;
    }

    li:hover {
      transform: scale(1.02);
    }

    .done {
      text-decoration: line-through;
      color: gray;
    }

    .delete {
      background: #ff4d4d;
      border-radius: 8px;
      padding: 5px 10px;
    }
  </style>
</head>

<body>

<header>🚀 FocusFlow</header>
<p class="subtitle">Stay productive. Stay focused.</p>

<div class="container">

  <div class="input-box">
    <input id="taskInput" placeholder="Add your next task..." />
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>

</div>

<script>

// Load saved tasks
window.onload = function () {
  const saved = JSON.parse(localStorage.getItem("tasks")) || [];
  saved.forEach(task => createTask(task.text, task.done));
};

function addTask() {
  const input = document.getElementById("taskInput");
  const text = input.value;

  if (text === "") return;

  createTask(text, false);
  saveTasks();

  input.value = "";
}

function createTask(text, isDone) {
  const li = document.createElement("li");

  li.innerHTML = `
    <span onclick="toggleDone(this)">${text}</span>
    <button class="delete" onclick="deleteTask(this)">X</button>
  `;

  if (isDone) {
    li.querySelector("span").classList.add("done");
  }

  document.getElementById("taskList").appendChild(li);
}

function deleteTask(btn) {
  btn.parentElement.remove();
  saveTasks();
}

function toggleDone(el) {
  el.classList.toggle("done");
  saveTasks();
}

function saveTasks() {
  const tasks = [];

  document.querySelectorAll("#taskList li").forEach(li => {
    tasks.push({
      text: li.querySelector("span").innerText,
      done: li.querySelector("span").classList.contains("done")
    });
  });

  localStorage.setItem("tasks", JSON.stringify(tasks));
}

</script>

</body>
</html>
